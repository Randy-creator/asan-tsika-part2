<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Asa - Missions by Products</title>
    <link href="/main.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>

<body>
<div th:replace="fragments/header :: header"></div>

<div class="p-6 bg-gray-50">
    <div th:replace="fragments/workerSelector :: workerSelector(missions, All)"></div>
</div>

<div class="px-6 pt-3 pb-12 bg-gray-50 min-h-screen">
    <!-- Main title -->
    <h2 class="text-2xl font-bold text-primary mb-6"
        th:text="'Missions by Products - ' + ${worker == null ? 'All' : worker.name()}">
    </h2>

    <!-- Product grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="p : ${products}"
             class="bg-white shadow-md rounded-lg p-4 border border-gray-300 hover:shadow-lg transition-shadow duration-200">

            <!-- Product details -->
            <div class="mb-4">
                <h3 class="text-lg font-semibold text-gray-900">
                    <span th:class="'text-' + ${p.code()}">
                        <span th:text="${p.code()}"></span> :
                        <span th:text="${p.name()}"></span>
                        <span class="text-sm text-gray-500"
                              th:text="' (' + ${p.executedDays()} + ')'">
                        </span>
                    </span>
                </h3>
            </div>

            <!-- Mission list -->
            <ul class="space-y-2">
                <li th:each="m : ${p.missions()}"
                    class="bg-gray-100 border border-gray-300 rounded-md p-3">

                    <!-- Mission details -->
                    <p class="text-gray-800 font-medium">
                        <span th:class="'text-' + ${m.getCode()}">
                            <span th:text="${m.getCode()}"></span> :
                            <span th:text="${m.getTitle()}"></span>
                        </span>
                    </p>
                    <p class="text-xs text-gray-600"
                       th:title="${m.getDescription()}"
                       th:text="${m.getDescription()}">
                    </p>
                </li>
            </ul>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
