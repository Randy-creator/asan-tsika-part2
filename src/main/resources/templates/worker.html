<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Asa - Profile</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-gray-50" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<div th:replace="fragments/header :: header"></div>

<main class="flex-grow container mx-auto py-12 px-4">
    <div class="max-w-xl mx-auto bg-white shadow-md rounded-xl p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">About yourself</h2>
        <div class="space-y-2">
            <div class="flex gap-2">
                <label class="block text-gray-500">Name :</label>
                <p class="text-lg font-medium text-gray-600" th:text="${worker.name}">Name</p>
            </div>
            <div class="flex gap-2">
                <label class="block text-gray-500">Email :</label>
                <p class="text-lg font-medium text-gray-600" th:text="${worker.email}">Email</p>
            </div>
            <div class="flex gap-2">
                <label class="block text-gray-500">Worker Type :</label>
                <p class="text-lg font-medium text-gray-600" th:text="${worker.workerType}">Worker Type</p>
            </div>
            <div class="flex gap-2">
                <label class="block text-gray-500">Entrance Date:</label>
                <p class="text-lg font-medium text-gray-600" th:text="${#dates.format(worker.entranceInstant, 'dd MMM yyyy')}">Entrance Date</p>
            </div>
            <div class="flex gap-2">
                <label class="block text-gray-500">Level :</label>
                <p class="text-lg font-medium text-gray-600" th:text="${worker.level}">Level</p>
            </div>
            <div class="flex gap-2">
                <label class="block text-gray-500">Level Entrance Date:</label>
                <p class="text-lg font-medium text-gray-600" th:text="${#dates.format(worker.levelEntranceInstant, 'dd MMM yyyy')}">Level Entrance Date</p>
            </div>
            <div class="pt-6">
                <a th:href="@{/worker-level-history(workerCode=${worker.code})}"
                   class="inline-flex items-center gap-2 bg-[#2D2D5A] hover:bg-[#16163F] text-white font-semibold py-2 px-4 rounded transition">
                    <i class="material-icons">history</i>
                    View level history
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
