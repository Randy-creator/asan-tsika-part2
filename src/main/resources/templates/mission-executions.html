<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Asa - Mission Executions</title>
    <link href="/main.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 text-gray-800">
<div th:replace="fragments/header :: header"></div>

<div class="m-6">
    <h2 class="text-xl font-bold mb-2">Worker</h2>
    <div th:replace="fragments/workerSelector :: workerSelector(mission-executions, All)"></div>

    <input id="monthPicker" type="month"
           th:value="${month}"
           onchange="updateMonth(this.value)"
           style="margin-top: 20px;" />
</div>

<div class="m-6">
    <h2 class="text-xl font-bold mb-2" th:text="'Mission executions - ' + ${worker == null ? 'All' : worker.name()}"></h2>
    <strong class="text-red-500">Care missions are colored red.</strong>
    <ul class="ml-6 list-disc">
        <li th:each="dailyExecution: ${dailyExecutions}" class="mb-4">
            <h3 class="text-lg font-semibold" th:text="${dailyExecution.date()}"></h3>
            <ul class="ml-6 list-disc">
                <li th:each="thMe: ${dailyExecution.thExecutionsPerMission()}" class="mb-2">
                    <h4 class="text-md font-medium"
                        th:text="${thMe.mission().code()} + ': ' + ${thMe.mission().title()}"
                        th:style="'color: ' + (${thMe.mission().isCare(careProductCode)} ? 'red' : 'black')">
                    </h4>
                    <ul class="ml-6 list-disc">
                        <li th:each="me: ${thMe.executions()}"
                            class="ml-4 text-sm"
                            th:text="${me.worker().name()} + ' ('+ ${me.dayPercentage()} +'): ' + ${me.comment()}"
                            th:style="'color: ' + (${me.mission().isCare(careProductCode)} ? 'red' : 'black')">
                        </li>
                    </ul>
                </li>
            </ul>
        </li>
    </ul>
</div>

<script>
    function updateFilters() {
        const workerCode = document.getElementById("worker").value;
        const month = document.getElementById("monthPicker").value;
        window.location.href = `/mission-executions?yearMonth=${month}&workerCode=${workerCode}`;
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("worker").addEventListener("change", updateFilters);
        document.getElementById("monthPicker").addEventListener("change", updateFilters);
    });
</script>
<div th:replace="fragments/footer :: footer"></div>
</body>

</html>
